<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Interactive Experiment Plots</title>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    #app { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 8px 8px; }
    #tab-buttons { display: flex; gap: 10px; width: 100%; }
    .tab-btn {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #d7d7d7;
      background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
      cursor: pointer;
      border-radius: 10px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .tab-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
    .tab-btn.active {
      background: linear-gradient(180deg, #2f6fec 0%, #1e5ad6 100%);
      color: #fff;
      border-color: #1e5ad6;
      box-shadow: 0 4px 10px rgba(30,90,214,0.28);
    }
    .tab-content { margin-top: 12px; width: 100%; }
    .tab-grid { display: grid; grid-template-columns: minmax(0, 1fr) 240px; gap: 16px; align-items: start; width: 100%; }
    .sidebar {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
      background: #fafafa;
      height: fit-content;
      grid-column: 2;
      grid-row: 1;
    }
    .sidebar-title { font-weight: 600; margin-bottom: 8px; }
    .chk { display: block; margin-bottom: 6px; font-size: 14px; }
    .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin: 0 8px 0 6px; border: 1px solid #333; }
    .toggle-all { margin-top: 10px; display: flex; gap: 8px; }
    .toggle-all button { padding: 4px 8px; border: 1px solid #bbb; background: #f3f3f3; cursor: pointer; border-radius: 4px; }
    .plot-grid { display: grid; grid-template-columns: 1fr; gap: 16px; grid-column: 1; grid-row: 1; }
    .plot { width: 100%; height: 420px; }

    @media (max-width: 760px) {
      #tab-buttons { flex-wrap: wrap; }
      .tab-btn { flex: 1 1 48%; }
      .tab-grid { grid-template-columns: 1fr; }
      .sidebar { display: flex; flex-wrap: wrap; gap: 6px 12px; height: auto; justify-content: flex-start; }
      .sidebar-title { width: 100%; }
      .chk { width: 48%; margin-bottom: 0; }
      .toggle-all { width: 100%; }
      .plot-grid { grid-template-columns: 1fr; }
      .plot { height: 380px; }
    }
  </style>
</head>
<body>

  <script>
    const DATA = {
      steps: JSON.parse(document.getElementById('data-steps').textContent),
      layers: JSON.parse(document.getElementById('data-layers').textContent),
      context: JSON.parse(document.getElementById('data-context').textContent),
      contextZero: JSON.parse(document.getElementById('data-context-zero').textContent),
    };

    const LOWRANK_MODE = "auto";
    const LOWRANK_ONLY_RATIO = "0.5";

    function collectMethods(results, lowrankMode) {
      const methods = new Set();
      results.forEach(r => {
        Object.keys(r).forEach(k => {
          if (k.startsWith("mse_") && k.endsWith("_mean") && k !== "mse_gd_mean") {
            let method = k.slice(4, -5);
            if (lowrankMode === "separate") {
              methods.add(method);
            } else if (method.startsWith("lowrank_")) {
              const m = method.match(/lowrank_(?:block\d+_)?k([0-9.]+)/);
              if (m) {
                const ratio = m[1];
                if (ratio !== LOWRANK_ONLY_RATIO) {
                  return;
                }
                methods.add(`lowrank_k${ratio}`);
              }
            } else {
              methods.add(method);
            }
          }
        });
      });
      return Array.from(methods).sort();
    }

    function labelMethod(method) {
      if (method === "lsa") return "Linear Self";
      if (method === "softmax") return "Softmax";
      if (method === "kernel") return "Kernelized Linear";
      if (method === "gla") return "Gated Linear";
      if (method === "gqa") return "Grouped-Query";
      if (method === "sparse") return "Sparse Causal";
      if (method.startsWith("lowrank_k")) return method.replace("lowrank_", "Low-rank ");
      if (method.startsWith("lowrank_block")) return method.replace("lowrank_", "Low-rank ");
      return method;
    }

    function methodLabel(methodKey) {
      if (methodKey === "gd") return "T-step Gradient Descent";
      return labelMethod(methodKey);
    }

    function extractSeries(results, keyPrefix) {
      const vals = [];
      const stds = [];
      results.forEach(r => {
        vals.push(r[`${keyPrefix}_mean`] ?? NaN);
        stds.push(r[`${keyPrefix}_std`] ?? NaN);
      });
      return { vals, stds };
    }

    function resolveMethodPrefix(r, methodKey, lowrankMode) {
      if (lowrankMode === "separate" || !methodKey.startsWith("lowrank_k")) {
        return methodKey;
      }
      const ratio = methodKey.replace("lowrank_k", "");
      if (ratio !== LOWRANK_ONLY_RATIO) {
        return null;
      }
      const normalKey = `lowrank_k${ratio}`;
      if (Object.prototype.hasOwnProperty.call(r, `mse_${normalKey}_mean`)) {
        return normalKey;
      }
      for (const k of Object.keys(r)) {
        if (k.startsWith("mse_lowrank_block") && k.endsWith("_mean") && k.includes(`_k${ratio}_mean`)) {
          return k.slice(4, -5);
        }
      }
      return null;
    }

    function extractSeriesForMethod(results, methodKey, lowrankMode, metricPrefix) {
      const vals = [];
      const stds = [];
      results.forEach(r => {
        const resolved = resolveMethodPrefix(r, methodKey, lowrankMode);
        if (!resolved) {
          vals.push(NaN);
          stds.push(NaN);
        } else {
          vals.push(r[`${metricPrefix}_${resolved}_mean`] ?? NaN);
          stds.push(r[`${metricPrefix}_${resolved}_std`] ?? NaN);
        }
      });
      return { vals, stds };
    }

    function buildColorMap(methodKeys) {
      const palette = [
        "#1b9e77", "#d95f02", "#7570b3", "#e7298a",
        "#66a61e", "#e6ab02", "#a6761d", "#666666",
        "#1f78b4", "#b2df8a", "#33a02c", "#fb9a99",
        "#e31a1c", "#fdbf6f", "#ff7f00", "#cab2d6",
        "#6a3d9a", "#ffff99", "#b15928", "#8dd3c7",
        "#80b1d3", "#fdb462", "#b3de69", "#fccde5",
      ];
      const sorted = [...methodKeys].sort();
      const map = {};
      sorted.forEach((m, i) => {
        map[m] = palette[i % palette.length];
      });
      return map;
    }

    function buildTabPlots(results, xKey, xLabel, titlePrefix, colorMap, lowrankMode, xRange) {
      const sorted = results.slice().sort((a, b) => (a[xKey] ?? 0) - (b[xKey] ?? 0));
      const x = sorted.map(r => r[xKey] ?? 0);
      const methods = collectMethods(sorted, lowrankMode);

      const mseTraces = [];
      const cosTraces = [];
      const traceMap = {};

      // GD trace (MSE only)
      const mseGd = extractSeries(sorted, "mse_gd");
      mseTraces.push({
        x, y: mseGd.vals,
        mode: "lines+markers",
        name: "T-step GD",
        line: { color: colorMap["gd"] },
        marker: { color: colorMap["gd"] },
        error_y: { type: "data", array: mseGd.stds, visible: true },
        showlegend: false,
      });
      traceMap["gd"] = { mse: [0], cos: [] };

      methods.forEach(method => {
        const mseSeries = extractSeriesForMethod(sorted, method, lowrankMode, "mse");
        const cosSeries = extractSeriesForMethod(sorted, method, lowrankMode, "cosine_sim");
        const label = labelMethod(method);
        const color = colorMap[method];

        const mseIdx = mseTraces.length;
        mseTraces.push({
          x, y: mseSeries.vals,
          mode: "lines+markers",
          name: label,
          line: { color },
          marker: { color },
          error_y: { type: "data", array: mseSeries.stds, visible: true },
          showlegend: false,
        });

        const cosIdx = cosTraces.length;
        cosTraces.push({
          x, y: cosSeries.vals,
          mode: "lines+markers",
          name: `${label} vs GD`,
          line: { color },
          marker: { color },
          error_y: { type: "data", array: cosSeries.stds, visible: true },
          showlegend: false,
        });

        traceMap[method] = { mse: [mseIdx], cos: [cosIdx] };
      });

      // Perfect alignment line (Cosine)
      const cosPerfectIdx = cosTraces.length;
      cosTraces.push({
        x, y: x.map(() => 1),
        mode: "lines",
        name: "Perfect Alignment",
        line: { dash: "dash", color: "red" },
        showlegend: false,
      });
      traceMap["perfect"] = { mse: [], cos: [cosPerfectIdx] };

      const mseLayout = {
        title: `${titlePrefix} Mean Squared Error`,
        xaxis: { title: xLabel },
        yaxis: { title: "Mean Squared Error" },
        margin: { l: 50, r: 30, t: 40, b: 50 },
        height: 420,
        showlegend: false,
      };
      if (xRange) {
        mseLayout.xaxis.range = xRange;
      }

      const cosLayout = {
        title: `${titlePrefix} Cosine Similarity`,
        xaxis: { title: xLabel },
        yaxis: { title: "Cosine Similarity" },
        margin: { l: 50, r: 30, t: 40, b: 50 },
        height: 420,
        showlegend: false,
      };
      if (xRange) {
        cosLayout.xaxis.range = xRange;
      }

      return { mseTraces, cosTraces, mseLayout, cosLayout, traceMap };
    }

    function computeContextRange(contextResults, contextZeroResults) {
      let contextMax = null;
      [contextResults, contextZeroResults].forEach(res => {
        if (!res) return;
        const xs = res.map(r => r.n_points).filter(x => x !== undefined);
        if (xs.length) {
          const mx = Math.max(...xs);
          contextMax = contextMax === null ? mx : Math.max(contextMax, mx);
        }
      });

      if (contextMax === null || !contextResults || !contextResults.length) return null;
      const minX = Math.min(...contextResults.map(r => r.n_points).filter(x => x !== undefined));
      return [minX, contextMax];
    }

    const contextRange = computeContextRange(DATA.context, DATA.contextZero);

    const tabs = [
      { key: "steps", label: "Steps Sweep", results: DATA.steps, xKey: "train_steps", xLabel: "Training Steps", title: "Steps Sweep" },
      { key: "layers", label: "Layers Sweep", results: DATA.layers, xKey: "num_layers", xLabel: "Number of Layers / GD Steps", title: "Layers Sweep" },
      { key: "context", label: "Context Sweep", results: DATA.context, xKey: "n_points", xLabel: "In-context Examples (n)", title: "Context Sweep", xRange: contextRange },
      { key: "contextZero", label: "Context Sweep (Zero Train)", results: DATA.contextZero, xKey: "n_points", xLabel: "In-context Examples (n)", title: "Context Sweep (Zero Train)", xRange: contextRange },
    ];

    const allMethods = new Set();
    tabs.forEach(t => {
      collectMethods(t.results, LOWRANK_MODE).forEach(m => allMethods.add(m));
    });
    allMethods.add("gd");
    const colorMap = buildColorMap(allMethods);
    colorMap["gd"] = "#ED7D31";

    const TAB_STATE = {};

    function createSidebar(tabId, traceMap, colorMap) {
      const methods = Object.keys(traceMap).filter(k => k !== "perfect");
      return methods.map(methodKey => {
        const label = methodLabel(methodKey);
        const color = colorMap[methodKey] || "#000000";
        return `\n<label class="chk">\n` +
          `<input type="checkbox" checked data-tab="${tabId}" data-key="${methodKey}" ` +
          `onchange="toggleMethod('${tabId}', '${methodKey}', this.checked)">` +
          `<span class="swatch" style="background:${color}"></span>${label}</label>`;
      }).join("");
    }

    function toggleMethod(tabId, methodKey, checked) {
      const state = TAB_STATE[tabId];
      if (!state) return;
      const vis = checked ? true : "legendonly";
      const map = state.traceMap[methodKey];
      if (!map) return;
      if (map.mse.length) {
        Plotly.restyle(state.mseId, { visible: vis }, map.mse);
      }
      if (map.cos.length) {
        Plotly.restyle(state.cosId, { visible: vis }, map.cos);
      }
    }

    function toggleAll(tabId, checked) {
      const state = TAB_STATE[tabId];
      if (!state) return;
      const map = state.traceMap;
      for (const key of Object.keys(map)) {
        if (key === "perfect") continue;
        const boxes = document.querySelectorAll(`input[data-tab='${tabId}'][data-key='${key}']`);
        boxes.forEach(b => b.checked = checked);
        toggleMethod(tabId, key, checked);
      }
    }

    function openTab(evt, tabId) {
      const contents = document.getElementsByClassName("tab-content");
      for (let i = 0; i < contents.length; i++) {
        contents[i].style.display = "none";
      }
      const buttons = document.getElementsByClassName("tab-btn");
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].className = buttons[i].className.replace(" active", "");
      }
      const tabEl = document.getElementById(tabId);
      if (tabEl) {
        tabEl.style.display = "block";
      }
      if (evt && evt.currentTarget) {
        evt.currentTarget.className += " active";
      }

      setTimeout(() => resizeTab(tabId), 80);
    }

    function resizeTab(tabId) {
      const state = TAB_STATE[tabId];
      if (!state) return;
      const ids = [state.mseId, state.cosId];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          Plotly.Plots.resize(el);
        }
      });
    }

    function init() {
      const tabButtons = document.getElementById("tab-buttons");
      const tabContents = document.getElementById("tab-contents");

      tabs.forEach((t, idx) => {
        const tabId = `tab${idx}`;
        const mseId = `mse${idx}`;
        const cosId = `cos${idx}`;

        const button = document.createElement("button");
        button.className = "tab-btn";
        button.textContent = t.label;
        button.onclick = (evt) => openTab(evt, tabId);
        tabButtons.appendChild(button);

        const plotData = buildTabPlots(t.results, t.xKey, t.xLabel, t.title, colorMap, LOWRANK_MODE, t.xRange);
        TAB_STATE[tabId] = { mseId, cosId, traceMap: plotData.traceMap };

        const sidebar = createSidebar(tabId, plotData.traceMap, colorMap);

        const tabDiv = document.createElement("div");
        tabDiv.id = tabId;
        tabDiv.className = "tab-content";
        tabDiv.style.display = idx === 0 ? "block" : "none";
        tabDiv.innerHTML = `\n<div class="tab-grid">\n` +
          `<div class="sidebar">\n` +
          `<div class="sidebar-title">Attention Mechanisms</div>\n` +
          `${sidebar}\n` +
          `<div class="toggle-all">\n` +
          `<button onclick=\"toggleAll('${tabId}', true)\">Select All</button>\n` +
          `<button onclick=\"toggleAll('${tabId}', false)\">Clear All</button>\n` +
          `</div>\n</div>\n` +
          `<div class="plot-grid">\n` +
          `<div id="${mseId}" class="plot"></div>\n` +
          `<div id="${cosId}" class="plot"></div>\n` +
          `</div>\n</div>`;

        tabContents.appendChild(tabDiv);

        Plotly.newPlot(mseId, plotData.mseTraces, plotData.mseLayout, { responsive: true });
        Plotly.newPlot(cosId, plotData.cosTraces, plotData.cosLayout, { responsive: true });
      });

      const firstBtn = document.getElementsByClassName("tab-btn")[0];
      if (firstBtn) {
        firstBtn.className += " active";
      }

      window.addEventListener("resize", () => {
        Object.keys(TAB_STATE).forEach(tabId => resizeTab(tabId));
      });
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
